# ---------------------------------------------------------------------------
# shorkie-paper path configuration
# ---------------------------------------------------------------------------
# Copy this file to config/paths.yaml (git-ignored) and edit `work_root` for
# your machine, or point $SHORKIE_CONFIG at a copy elsewhere. Loaded by
# src/shorkie/config.py.  ${token} resolves to an environment variable of that
# name if set, otherwise to another key here (dotted path, e.g. ${genome.fasta}).
# ${repo_root} is injected automatically (the repository root).
# ---------------------------------------------------------------------------

# Legacy work directory that holds the large data / model / experiment trees.
# This is the ONE place an absolute machine path is recorded; override it.
work_root: /home/kchao10/scr4_ssalzbe1/khchao/Yeast_ML

# Where data/download.sh places downloaded PUBLIC artifacts (clean layout).
release_root: ./data_local

# Small reference files committed in this repo.
reference_dir: ${repo_root}/data/R64_annotations

# External motif-database directory (MEME/YeTFaSCo yeast set: merged_meme.meme,
# merged_meme_high_conf.meme, 3UTR_prob.meme, …). Used by the modisco `report`
# steps in the motif-analysis pipelines to annotate discovered motifs. Not
# committed (external download/build) — override for your machine.
motif_db_dir: /home/kchao10/tools/motif_databases/YEAST

# --- Sub-roots of the work dir (preserve the existing tree structure) ---
data_root:           ${work_root}/data
seq_experiment_root: ${work_root}/seq_experiment
lm_experiment_root:  ${work_root}/lm_experiment
experiments_root:    ${work_root}/experiments

# --- S. cerevisiae R64 reference genome (lives in the LM corpus data tree) ---
r64_data_dir: ${data_root}/yeast/ensembl_fungi_59/test_chrXI_chrXIII_chrXV__valid_chrXII_chrXIV_chrXVI/data_r64_gtf
genome:
  fasta:       ${r64_data_dir}/fasta/GCA_000146045_2.cleaned.fasta
  gtf:         ${r64_data_dir}/gtf/GCA_000146045_2.59.gtf
  chrom_sizes: ${reference_dir}/chrom.sizes
  mask_bed:    ${reference_dir}/mask_rossi.bed
  gaps_bed:    ${reference_dir}/assembly_gaps.bed
  # Supervised-track TFRecord build uses the SGD S288C R64-3-1 assembly (publicly
  # available; see scripts/01_data_build/supervised_tracks/README.md). Not committed
  # (~12 MB) — point this at a local copy.
  r64_supervised_fasta: ${seq_experiment_root}/R64_annotations/S288C_R64-3-1.fasta

# --- Trained models ---
models:
  num_folds: 8
  # Shorkie_LM directory and its best checkpoint (the --restore target).
  shorkie_lm:            ${lm_experiment_root}/test_chrXI_chrXIII_chrXV__valid_chrXII_chrXIV_chrXVI/LM_Johannes/lm_saccharomycetales_gtf/lm_saccharomycetales_gtf_unet_small_bert_drop
  shorkie_lm_checkpoint: ${models.shorkie_lm}/train/model_best.h5
  # Supervised 8-fold models (each holds train/f0c0..f7c0/).
  shorkie_finetuned:     ${seq_experiment_root}/exp_histone__chip_exo__rna_seq_no_norm_5215_tracks/16bp/self_supervised_unet_small_bert_drop
  shorkie_scratch:       ${seq_experiment_root}/exp_histone__chip_exo__rna_seq_no_norm_5215_tracks/16bp/shorkie_models/shorkie_random_initialization

# --- Datasets ---
datasets:
  supervised_root: ${seq_experiment_root}/exp_histone__chip_exo__rna_seq_no_norm_5215_tracks/16bp
  targets_sheet:   ${datasets.supervised_root}/cleaned_sheet.txt
  # 8-fold supervised TFRecord dir (hound_data.py output) — the positional data
  # arg consumed by westminster_train_folds.py for the finetuned + scratch models.
  supervised_data: ${datasets.supervised_root}/data
  bigwigs:         ${data_root}/bigwigs
  mpra:            ${data_root}/MPRA
  eqtl:            ${data_root}/eQTL
  lm_corpus_root:  ${data_root}/yeast/ensembl_fungi_59      # 4 corpus tiers live under here
  # Chromosome-holdout split subdir under lm_corpus_root holding the 4 tier dirs
  # (data_{r64,strains,saccharomycetales,fungi_1385}_gtf/) + per-tier species CSVs.
  lm_corpus_split_root: ${datasets.lm_corpus_root}/test_chrXI_chrXIII_chrXV__valid_chrXII_chrXIV_chrXVI
  # The 165_Saccharomycetales tier dir (tfrecords/ + statistics.json) the LM trains on
  # — hound_train.py's --eval_dir and positional data arg. This is the released-corpus
  # layout; the original training read from an internal seqnn/ensembl_fungi_59_3 staging
  # path that no longer exists.
  lm_train_dir: ${datasets.lm_corpus_split_root}/data_saccharomycetales_gtf

# --- External code (in-repo git submodules) ---
external:
  baskerville_scripts: ${repo_root}/external/baskerville-yeast/src/baskerville/scripts
  westminster_scripts: ${repo_root}/external/westminster/src/westminster/scripts
